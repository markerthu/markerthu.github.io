<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper Citation Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
  --accent:#6366f1; --accent-2:#a855f7; --accent-3:#ec4899;
  --ink:#0f172a; --muted:#64748b; --line:#e8ecf3;
  --bg:#f4f6fb; --surface:#ffffff; --surface-2:#f8fafc;
  --code-bg:#0f172a; --code-ink:#c7d2fe;
  --shadow:0 1px 2px rgba(16,24,40,.04), 0 8px 24px -12px rgba(79,70,229,.14);
  --shadow-lg:0 18px 50px -18px rgba(79,70,229,.28);
  --grad:linear-gradient(120deg,var(--accent) 0%,var(--accent-2) 55%,var(--accent-3) 110%);
}
[data-theme="dark"]{
  --ink:#e6edf6; --muted:#93a4bd; --line:#20293a;
  --bg:#0b0f1a; --surface:#111827; --surface-2:#0e1523;
  --code-bg:#05070d; --code-ink:#a5b4fc;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 12px 30px -14px rgba(0,0,0,.6);
  --shadow-lg:0 22px 60px -20px rgba(0,0,0,.7);
}
*{ -webkit-font-smoothing:antialiased; }
html{ overflow-y:scroll; scrollbar-gutter:stable; }
body{ font-family:'Inter',system-ui,sans-serif; color:var(--ink); background:var(--bg);
  transition:background .3s, color .3s; }
.container-narrow{ max-width:1060px; }
.fw-600{ font-weight:600; }
.muted{ color:var(--muted); } a{ color:var(--accent); text-decoration:none; } a:hover{ text-decoration:underline; }
/* hero */
.hero{ position:relative; overflow:hidden; border-bottom:1px solid var(--line);
  background:
    radial-gradient(900px 320px at 8% -30%, rgba(99,102,241,.18), transparent 60%),
    radial-gradient(760px 300px at 100% -20%, rgba(168,85,247,.16), transparent 60%),
    linear-gradient(180deg, var(--surface-2), var(--surface)); }
[data-theme="dark"] .hero{ background:
    radial-gradient(900px 340px at 8% -30%, rgba(99,102,241,.22), transparent 60%),
    radial-gradient(760px 300px at 100% -20%, rgba(168,85,247,.18), transparent 60%),
    linear-gradient(180deg, #0e1523, var(--surface)); }
.brand{ font-weight:800; font-size:32px; letter-spacing:-.03em; display:flex; align-items:center; gap:12px; }
.brand-emoji{ -webkit-text-fill-color:initial; filter:drop-shadow(0 3px 8px rgba(99,102,241,.35)); }
.brand-text{ background:var(--grad); background-size:200% auto;
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  animation:hueShift 8s ease infinite; }
@keyframes hueShift{ 0%,100%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } }
.tagline{ color:var(--muted); font-size:15px; margin-top:4px; }
.hero-tools{ display:flex; align-items:center; gap:10px; }
.lang-toggle{ display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden;
  background:var(--surface); box-shadow:var(--shadow); }
.lang-toggle button{ border:0; background:transparent; padding:7px 16px; font-weight:600; color:var(--muted); cursor:pointer; transition:.15s; }
.lang-toggle button.active{ background:var(--grad); color:#fff; }
.theme-btn{ width:40px; height:40px; border-radius:50%; border:1px solid var(--line); background:var(--surface);
  box-shadow:var(--shadow); cursor:pointer; font-size:17px; line-height:1; display:flex; align-items:center; justify-content:center; transition:transform .2s, background .2s; }
.theme-btn:hover{ transform:translateY(-2px) rotate(-8deg); }
.nav-pills{ gap:8px; }
.nav-pills .nav-link{ color:var(--muted); font-weight:700; font-size:14px; border-radius:999px; padding:8px 18px;
  border:1px solid transparent; transition:.15s; }
.nav-pills .nav-link:hover{ color:var(--accent); background:rgba(99,102,241,.08); }
.nav-pills .nav-link.active{ background:var(--grad); color:#fff; box-shadow:0 8px 20px -8px rgba(99,102,241,.6); }
/* cards */
.card{ border:1px solid var(--line); border-radius:20px; background:var(--surface); box-shadow:var(--shadow);
  transition:transform .25s, box-shadow .25s, border-color .25s; animation:fadeUp .5s both; }
.card:hover{ box-shadow:var(--shadow-lg); }
.card-h{ font-weight:800; font-size:12.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
.stat-num{ font-size:72px; font-weight:800; line-height:1; letter-spacing:-.03em;
  background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.stat-card-glow{ position:relative; overflow:hidden; }
.stat-card-glow::before{ content:''; position:absolute; inset:auto -40% -60% -40%; height:150px;
  background:radial-gradient(closest-side, rgba(99,102,241,.16), transparent); }
.kv{ display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px dashed var(--line); }
.kv:last-child{ border-bottom:0; }
.kv .k{ color:var(--muted); white-space:nowrap; } .kv .v{ font-weight:600; text-align:right; word-break:break-all; }
/* badge copy rows — terminal style */
.copyrow{ display:flex; gap:8px; align-items:center; margin-bottom:8px; }
.copyrow code{ flex:1; background:var(--code-bg); border:1px solid var(--line); border-radius:10px;
  padding:9px 12px; font-size:12.5px; color:var(--code-ink); white-space:nowrap; overflow-x:auto;
  font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace; }
.copyrow .tag{ width:84px; flex:0 0 84px; font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap; }
#ovName{ color:var(--ink); font-weight:800; font-size:18px; }
.copyrow .btn{ border-radius:9px; border:0; background:var(--grad); color:#fff; font-weight:700; padding:7px 14px; box-shadow:0 6px 16px -8px rgba(99,102,241,.7); }
.copyrow .btn:hover{ filter:brightness(1.08); color:#fff; }
.range .btn{ border-radius:999px; padding:4px 13px; font-size:13px; font-weight:600; }
.range .btn-primary{ background:var(--grad); border:0; }
.range .btn-outline-secondary{ color:var(--muted); border-color:var(--line); }
/* badge format chooser */
.badge-opts{ display:flex; flex-wrap:wrap; justify-content:center; gap:10px; margin-bottom:14px; }
.badge-opt{ background:var(--surface-2); border:1.5px solid var(--line); border-radius:12px; padding:8px 12px;
  cursor:pointer; line-height:0; transition:.15s; }
.badge-opt:hover{ transform:translateY(-2px); border-color:var(--accent); }
.badge-opt.sel{ border-color:var(--accent); background:rgba(99,102,241,.10); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
.badge-opt img{ height:26px; display:block; }
/* papers */
.paper-table{ flex:1 1 0; min-height:0; overflow-y:auto; }
.paper-table table{ margin:0; } .paper-table td{ cursor:pointer; vertical-align:middle; color:var(--ink); border-color:var(--line); }
.paper-table tr{ transition:background .12s; }
.paper-table tr:hover{ background:rgba(99,102,241,.06); }
.paper-table tr.active{ background:rgba(99,102,241,.12); }
.form-control{ background:var(--surface-2); border:1px solid var(--line); color:var(--ink); border-radius:12px; }
.form-control:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); background:var(--surface); color:var(--ink); }
.cit-pill{ background:var(--grad); color:#fff; font-weight:800; border-radius:999px; padding:3px 12px; font-size:13px;
  box-shadow:0 6px 14px -8px rgba(99,102,241,.8); }
.chart-box{ position:relative; height:300px; }
/* calendar */
.cal-scroll{ overflow-x:auto; text-align:center; }
#calendar{ display:inline-block; text-align:left; }
.cal-months{ display:flex; padding-left:30px; }
.cal-mcell{ width:15px; font-size:10px; color:var(--muted); white-space:nowrap; }
.cal-row{ display:flex; }
.cal-wd{ display:flex; flex-direction:column; gap:3px; width:26px; margin-right:4px; }
.cal-wdcell{ height:12px; line-height:12px; font-size:9px; color:var(--muted); text-align:right; }
.cal-grid{ display:flex; gap:3px; }
.cal-col{ display:flex; flex-direction:column; gap:3px; }
.cal-cell{ width:12px; height:12px; border-radius:3px; background:var(--line); transition:transform .1s; }
.cal-cell:hover{ transform:scale(1.35); }
.cal-cell.hit{ background:var(--grad); }
.cal-cell.empty{ background:transparent; }
.legend{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); margin-top:8px; }
.legend .cal-cell{ display:inline-block; }
.footer{ text-align:center; color:var(--muted); font-size:13px; margin:28px 0; }
.tab-pane.show{ animation:fadeUp .45s both; }
@keyframes fadeUp{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:translateY(0); } }
table{ color:var(--ink); }
hr{ border-color:var(--line); opacity:.6; }
@media (prefers-reduced-motion:reduce){ *{ animation:none !important; } }
</style>
</head>
<body>
<div class="hero py-4">
  <div class="container container-narrow">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
      <div>
        <div class="brand"><span class="brand-emoji">📈</span><span class="brand-text">Paper Citation Tracker</span></div>
        <div class="tagline" id="tagline"></div>
      </div>
      <div class="hero-tools">
        <div class="lang-toggle" id="langToggle">
          <button data-lang="en" class="active">English</button>
          <button data-lang="zh">中文</button>
        </div>
        <button class="theme-btn" id="themeBtn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      </div>
    </div>
    <ul class="nav nav-pills gap-2 mt-3" id="tabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#p-overall" data-i18n="nav_overall"></button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#p-papers" data-i18n="nav_papers"></button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#p-info" data-i18n="nav_info"></button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#p-fork" data-i18n="nav_fork"></button></li>
    </ul>
  </div>
</div>

<div class="container container-narrow py-4">
  <div class="tab-content">
    <!-- OVERALL (default) -->
    <div class="tab-pane fade show active" id="p-overall">
      <div class="row g-3">
        <div class="col-md-4">
          <div class="card stat-card-glow p-4 text-center h-100 d-flex flex-column justify-content-center">
            <div class="stat-num" id="totalNum">–</div>
            <div class="muted mt-2" data-i18n="total_label"></div>
            <hr class="w-75 mx-auto my-3">
            <div class="fw-600" id="ovName"></div>
            <div class="muted" style="font-size:13px" id="ovAff"></div>
          </div>
        </div>
        <div class="col-md-8">
          <div class="card p-3 h-100">
            <div class="card-h mb-2" data-i18n="badge_title"></div>
            <div class="badge-opts" id="totalBadgeOpts"></div>
            <div id="totalBadgeCopies"></div>
          </div>
        </div>
        <div class="col-12">
          <div class="card p-3">
            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
              <div class="card-h" data-i18n="trend_total"></div>
              <div class="range btn-group" id="totalRange"></div>
            </div>
            <div class="chart-box"><canvas id="totalChart"></canvas></div>
            <div class="card-h mt-3 mb-2" data-i18n="embed_label"></div>
            <div id="totalEmbed"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- PAPERS -->
    <div class="tab-pane fade" id="p-papers">
      <div class="row g-3">
        <div class="col-lg-5">
          <div class="card p-2 h-100 d-flex flex-column" style="min-height:560px">
            <input class="form-control form-control-sm mb-2" id="paperSearch" data-i18n-ph="search_ph">
            <div class="paper-table"><table class="table table-sm table-hover align-middle">
              <tbody id="paperRows"></tbody>
            </table></div>
          </div>
        </div>
        <div class="col-lg-7">
          <div class="card p-3 h-100" id="paperDetail" style="min-height:560px">
            <div class="muted text-center py-5" data-i18n="select_paper"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- INFO -->
    <div class="tab-pane fade" id="p-info">
      <div class="row g-3">
        <div class="col-md-6"><div class="card p-3 h-100"><div id="infoAuthor"></div></div></div>
        <div class="col-md-6"><div class="card p-3 h-100"><div id="infoMeta"></div></div></div>
        <div class="col-12"><div class="card p-3">
          <div class="card-h mb-2" data-i18n="cal_title"></div>
          <div class="cal-scroll"><div id="calendar"></div></div>
          <div class="legend"><span data-i18n="not_synced"></span>
            <span class="cal-cell"></span><span class="cal-cell hit"></span>
            <span data-i18n="synced"></span></div>
        </div></div>
      </div>
    </div>

    <!-- FORK -->
    <div class="tab-pane fade" id="p-fork">
      <div class="card p-4"><div id="forkBody"></div></div>
    </div>
  </div>

  <div class="footer">
    <div id="footNote"></div>
    <div class="mt-1"><span data-i18n="designed_by"></span>
      <a href="https://zhouz.dev" target="_blank" rel="noopener">Zhi Zhou</a> ·
      <a href="https://huggingface.co/spaces/WNJXYK/paper-citation-tracker" target="_blank" rel="noopener" data-i18n="original_space"></a></div>
  </div>
</div>

<script>
const I18N = {
  en:{ nav_info:"ℹ️ Info", nav_overall:"📊 Overall", nav_papers:"📄 Papers", nav_fork:"❤️ Fork",
    tagline:"Daily Google Scholar citation tracking",
    author:"Author", name:"Name", aff:"Affiliation", scholar:"Google Scholar",
    daily:"Daily fetch (UTC)", today:"Fetched today", last:"Last recorded",
    storage:"Space & data", space:"Space", repo:"Dataset repo", size:"Dataset size",
    cal_title:"📅 Fetch calendar", total_label:"Total citations",
    badge_title:"🏷️ Badge — click a style, then copy any format below",
    trend_total:"Total citations over time", trend_paper:"Citations over time",
    embed_label:"🖼️ Embed chart (iframe) — copy into any page",
    search_ph:"Search papers…", select_paper:"👈 Select a paper from the list",
    copy:"Copy", copied:"Copied!", yes:"Yes", no:"No", never:"never", cit:"citations",
    synced:"synced", not_synced:"not synced",
    footNote:"Badges stay live while the Space is awake · Fork it to track your own profile",
    designed_by:"Designed by", original_space:"Original Space" },
  zh:{ nav_info:"ℹ️ 信息", nav_overall:"📊 总体统计", nav_papers:"📄 论文统计", nav_fork:"❤️ 复制指南",
    tagline:"每日追踪 Google Scholar 引用",
    author:"用户信息", name:"姓名", aff:"单位", scholar:"Google Scholar",
    daily:"每日抓取时间 (UTC)", today:"今天是否已抓取", last:"最近记录",
    storage:"Space 与数据", space:"Space", repo:"数据集仓库", size:"数据集大小",
    cal_title:"📅 抓取日历", total_label:"总引用",
    badge_title:"🏷️ 徽章 — 点击选择样式，然后复制任意格式代码",
    trend_total:"总引用趋势", trend_paper:"引用趋势",
    embed_label:"🖼️ 嵌入图表 (iframe) — 复制到任意页面",
    search_ph:"搜索论文…", select_paper:"👈 从左侧列表选择一篇论文",
    copy:"复制", copied:"已复制!", yes:"是", no:"否", never:"从未", cit:"引用",
    synced:"已同步", not_synced:"未同步",
    footNote:"Space 活跃时徽章始终可用 · 复制本 Space 即可追踪你自己的主页",
    designed_by:"设计者", original_space:"原始 Space" }
};
function envTable(lang){
  const H = lang==='zh' ? ['变量','类型','必需','说明'] : ['Name','Type','Required','Description'];
  const VAR = lang==='zh' ? '⚙️ Variable' : '⚙️ Variable';
  const SEC = lang==='zh' ? '🔒 Secret' : '🔒 Secret';
  const rows = [
    ['SCHOLAR_URL',VAR,'✅', lang==='zh'
      ?'Google Scholar 主页地址，例如：<code>https://scholar.google.com/citations?user=VzvP5a8AAAAJ</code>'
      :'Google Scholar profile URL, e.g. <code>https://scholar.google.com/citations?user=VzvP5a8AAAAJ</code>'],
    ['SERPAPI_KEY',SEC,'✅', lang==='zh'?'SerpApi key（<code>https://serpapi.com</code>，用于在 HF 上爬取谷歌学术信息，免费账号额度就够用）':'SerpApi key (<code>https://serpapi.com</code>, used to scrape Google Scholar on HF; the free tier is enough)'],
    ['HF_TOKEN',SEC,'✅', lang==='zh'?'Hugging Face 具备读写权限的 Token（用于自动构建数据集、自动更新环境变量）':'Hugging Face read-write token (auto-creates the dataset & auto-updates the Space variable)'],
    ['HF_DATASET_REPO',VAR,'—', lang==='zh'
      ?'数据集仓库名（用于保存引用数据）。无需手动设置，首次运行时自动创建 Space 变量 <code>&lt;你的用户名&gt;/&lt;space名&gt;-data</code> 与对应私有数据集；当且仅当需要使用自定义数据集时才设置此变量。'
      :'Dataset repo name (stores the citation data). No need to set it — on first run the app auto-creates the Space variable <code>&lt;your-username&gt;/&lt;space&gt;-data</code> and its private dataset; set this only to use a custom dataset.'],
    ['DAILY_HOUR',VAR,'—', lang==='zh'?'每日抓取的 UTC 小时（默认 3）':'UTC hour for the daily fetch (default 3)'],
    ['DATASET_SQUASH',VAR,'—', lang==='zh'?'每日写入后把数据集 Git 历史压成 1 个 Commit 以省空间（默认开启，设 0 关闭）':'squash dataset git history to 1 commit after each write to save space (on by default; set 0 to disable)'],
  ];
  const badge = t => t===SEC
    ? `<span class="badge rounded-pill" style="background:#fef3c7;color:#92400e">${t}</span>`
    : `<span class="badge rounded-pill" style="background:#e0e7ff;color:#3730a3">${t}</span>`;
  const note = lang==='zh'
    ? `<p class="muted" style="font-size:13px"><b>🔒 Secret</b> 存到 Space 的 <b>Settings → Secrets</b>（加密、不可见）；<b>⚙️ Variable</b> 存到 <b>Settings → Variables</b>（明文、可见）。</p>`
    : `<p class="muted" style="font-size:13px"><b>🔒 Secret</b> → add under <b>Settings → Secrets</b> (encrypted, hidden); <b>⚙️ Variable</b> → <b>Settings → Variables</b> (plain, visible).</p>`;
  return note + `<table class="table table-sm align-middle"><thead><tr>`
    + H.map(h=>`<th>${h}</th>`).join('') + `</tr></thead><tbody>`
    + rows.map(r=>`<tr><td><code>${r[0]}</code></td><td>${badge(r[1])}</td><td class="text-center">${r[2]}</td><td>${r[3]}</td></tr>`).join('')
    + `</tbody></table>`;
}
const FORK = {
 en:(`<h4>🔀 How to fork this Space</h4><ol>
   <li>Click the <b>⋮</b> menu icon at the top-right, then click <b>Duplicate this Space</b> to duplicate this Space.</li>
   <li>Configure the variables / secrets below as needed. The dialog may pre-fill <code>HF_DATASET_REPO</code> with the original's dataset; keep or clear it. On first run the app detects it isn't yours and switches to your own <code>&lt;your-username&gt;/&lt;your-space-name&gt;-data</code>, auto-creating a private dataset. No manual setup needed.</li>
   <li>Click <b>Duplicate</b> to create your Space.</li>
   <li>If the page or a badge isn't accessed for a long time, the Space goes to sleep. The next visit to the page or a badge wakes it up again.</li></ol>
   <h5 class="mt-4">⚙️ Configurable environment variables</h5>`),
 zh:(`<h4>🔀 如何复制这个 Space</h4><ol>
   <li>点击右上角菜单图标 <b>⋮</b>，再点击 <b>Duplicate this Space</b> 复制本 Space。</li>
   <li>根据实际情况，配置下方的变量 / 密钥。复制对话框可能预填 <code>HF_DATASET_REPO</code> 为原 Space 的数据集，可保留或清空；首次运行时应用会发现它不属于你，自动改用你自己的 <code>&lt;你的用户名&gt;/&lt;你的space名&gt;-data</code> 并创建私有数据集，无需手动设置。</li>
   <li>点击 <b>Duplicate</b> 复制本 Space。</li>
   <li>若长时间未访问本页面或 Badge，则 Space 将进入休眠状态。下一次访问本页面或 Badge 将重新启动本 Space。</li></ol>
   <h5 class="mt-4">⚙️ 可配置的环境变量</h5>`)
};

let DATA=null, LANG='en', totalChart=null, paperChart=null, selPid=null, totalDays='All', paperDays='All';
let totalFmt='full', paperFmt='full';
const BADGE_FMTS=['iconnum','full','num'];   // 1 icon+num · 2 icon+Citations+num (default) · 3 num only
const T = k => (I18N[LANG][k]||k);
const RANGES = ['30','90','180','365','All'];
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function shield(path){ return 'https://img.shields.io/endpoint?url=' + encodeURIComponent(DATA.badge_base + path); }
// Badges are images and can't carry a link themselves — the click-through has to
// wrap the embed. So the Markdown/HTML snippets get wrapped in a link to `linkUrl`
// (the standard GitHub-README pattern); the raw image URL row stays plain.
function badgeMd(p, linkUrl){ const img=`![citations](${shield(p)})`; return linkUrl ? `[${img}](${linkUrl})` : img; }
function badgeHtml(p, linkUrl){ const img=`<img src="${shield(p)}" alt="citations">`;
  return linkUrl ? `<a href="${linkUrl}" target="_blank" rel="noopener">${img}</a>` : img; }
function copyText(txt, btn){ navigator.clipboard.writeText(txt).then(()=>{ const o=btn.textContent; btn.textContent=T('copied'); setTimeout(()=>btn.textContent=o,1200); }); }
function copyRows(path, linkUrl){
  const items=[['Markdown',badgeMd(path, linkUrl)],['HTML',badgeHtml(path, linkUrl)],['URL',shield(path)]];
  return items.map(([tag,val])=>`<div class="copyrow"><span class="tag">${tag}</span>`
    +`<code>${esc(val)}</code>`
    +`<button class="btn btn-sm btn-outline-primary" onclick='copyText(${JSON.stringify(val)}, this)'>${T('copy')}</button></div>`).join('');
}
function badgePath(basePath, fmt){ return basePath + '?fmt=' + fmt; }
function renderBadgeChooser(optsId, copiesId, basePath, curFmt, onPick, linkUrl){
  const opts=document.getElementById(optsId); const copies=document.getElementById(copiesId);
  if(opts){
    opts.innerHTML = BADGE_FMTS.map(f=>
      `<button type="button" class="badge-opt${f===curFmt?' sel':''}" data-fmt="${f}" title="${f}">`
      +`<img src="${shield(badgePath(basePath,f))}" alt="${f}"></button>`).join('');
    opts.querySelectorAll('.badge-opt').forEach(b=>b.onclick=()=>onPick(b.dataset.fmt));
  }
  if(copies) copies.innerHTML = copyRows(badgePath(basePath, curFmt), linkUrl);
}
function scholarId(url){ const m=(url||'').match(/[?&]user=([^&]+)/); return m?m[1]:(url||''); }
// Click-through targets for the embeddable badges.
function authorScholarUrl(){
  const u=(DATA.author&&DATA.author.scholar_url)||'';
  if(/^https?:\/\//i.test(u)) return u;                       // already a full profile URL
  const id=scholarId(u);                                       // else a raw id → build canonical URL
  return id ? 'https://scholar.google.com/citations?user='+encodeURIComponent(id) : u;
}
function paperScholarUrl(pid){
  // paper_id is "<authorId>:<paperHash>", exactly Scholar's citation_for_view value.
  const uid=scholarId((DATA.author&&DATA.author.scholar_url)||'') || (pid.split(':')[0]||'');
  return 'https://scholar.google.com/citations?view_op=view_citation&hl=en&user='
    +encodeURIComponent(uid)+'&citation_for_view='+encodeURIComponent(pid);
}
function copyOne(tag, val){ return `<div class="copyrow"><span class="tag">${tag}</span><code>${esc(val)}</code>`
  +`<button class="btn btn-sm btn-outline-primary" onclick='copyText(${JSON.stringify(val)}, this)'>${T('copy')}</button></div>`; }
function embedSnippet(p, days){ const q='p='+encodeURIComponent(p)+((days&&days!=='All')?('&days='+days):'');
  return `<iframe src="${DATA.badge_base}/embed?${q}" width="640" height="320" style="border:0;max-width:100%" loading="lazy"></iframe>`; }
function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function monday(d){ const x=new Date(d); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); x.setHours(0,0,0,0); return x; }

function filterDays(dates, vals, days){
  if(days==='All') return {dates, vals};
  const n=parseInt(days); const cut=new Date(); cut.setDate(cut.getDate()-n);
  const d2=[],v2=[]; dates.forEach((d,i)=>{ if(new Date(d+'T00:00:00')>=cut){ d2.push(d); v2.push(vals[i]); } });
  return {dates:d2, vals:v2};
}
function drawChart(canvasId, dates, vals, label, existing){
  if(existing) existing.destroy();
  const cv=document.getElementById(canvasId); const ctx=cv.getContext('2d');
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const g=ctx.createLinearGradient(0,0,0,300);
  g.addColorStop(0,'rgba(99,102,241,.34)'); g.addColorStop(1,'rgba(168,85,247,.02)');
  const grid = dark ? 'rgba(148,163,184,.12)' : 'rgba(100,116,139,.10)';
  const tick = dark ? '#93a4bd' : '#64748b';
  return new Chart(cv,{ type:'line',
    data:{ labels:dates, datasets:[{ label, data:vals, borderColor:'#6366f1',
      backgroundColor:g, fill:true, tension:.35, pointRadius:0, pointHoverRadius:5,
      pointHoverBackgroundColor:'#a855f7', pointHoverBorderColor:'#fff', pointHoverBorderWidth:2,
      borderWidth:2.5 }]},
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false},
        tooltip:{ backgroundColor:dark?'#05070d':'#0f172a', padding:10, cornerRadius:10, borderColor:'#6366f1',
          borderWidth:1, titleColor:'#c7d2fe', bodyColor:'#fff', displayColors:false }},
      scales:{ y:{ beginAtZero:false, grace:'6%', grid:{color:grid}, ticks:{color:tick} },
        x:{ grid:{display:false}, ticks:{color:tick, maxTicksLimit:8, maxRotation:0, autoSkip:true} } } } });
}
function renderRange(containerId, active, cb){
  const el=document.getElementById(containerId); if(!el) return; el.innerHTML='';
  RANGES.forEach(r=>{ const b=document.createElement('button');
    b.className='btn btn-sm '+(r===active?'btn-primary':'btn-outline-secondary');
    b.textContent=(r==='All'?'All':r+'d'); b.onclick=()=>cb(r); el.appendChild(b); });
}

function renderInfo(){
  const a=DATA.author;
  document.getElementById('infoAuthor').innerHTML =
    `<div class="card-h mb-2">👤 ${T('author')}</div>`
    +`<div class="kv"><span class="k">${T('name')}</span><span class="v">${esc(a.name)||'—'}</span></div>`
    +`<div class="kv"><span class="k">${T('aff')}</span><span class="v">${esc(a.affiliation)||'—'}</span></div>`
    +`<div class="kv"><span class="k">${T('scholar')}</span><span class="v"><a href="${esc(a.scholar_url)}" target="_blank" rel="noopener">${esc(scholarId(a.scholar_url))}</a></span></div>`
    +`<div class="kv"><span class="k">${T('daily')}</span><span class="v">${String(DATA.daily_hour).padStart(2,'0')}:00</span></div>`
    +`<div class="kv"><span class="k">${T('today')}</span><span class="v">${DATA.fetched_today?('✅ '+T('yes')):('❌ '+T('no'))}</span></div>`
    +`<div class="kv"><span class="k">${T('last')}</span><span class="v">${DATA.updated||T('never')}</span></div>`;
  const spaceUrl='https://'+DATA.space_host;
  document.getElementById('infoMeta').innerHTML =
    `<div class="card-h mb-2">☁️ ${T('storage')}</div>`
    +`<div class="kv"><span class="k">${T('space')}</span><span class="v"><a href="${spaceUrl}" target="_blank" rel="noopener">${DATA.space_host}</a></span></div>`
    +`<div class="kv"><span class="k">${T('repo')}</span><span class="v">${DATA.dataset_repo?`<a href="https://huggingface.co/datasets/${esc(DATA.dataset_repo)}" target="_blank" rel="noopener">${esc(DATA.dataset_repo)}</a>`:'—'}</span></div>`
    +`<div class="kv"><span class="k">${T('size')}</span><span class="v">${esc(DATA.dataset_size)}</span></div>`
    +(DATA.error?`<div class="mt-2 text-danger" style="font-size:13px">⚠️ ${esc(DATA.error)}</div>`:'');
  renderCalendar();
}

function renderCalendar(){
  if(!DATA) return;
  const rec=new Set(DATA.history.dates);
  const grid=document.getElementById('calendar');
  const today=new Date(DATA.today+'T00:00:00');
  const weeks=53;                                  // a full year ending today
  const start=monday(today); start.setDate(start.getDate()-(weeks-1)*7);
  const MON = LANG==='zh'?['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']
    :['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WD = LANG==='zh'?['一','','三','','五','','']:['Mon','','Wed','','Fri','',''];
  // size cells to fill the available width
  const gap=3, wdW=28;
  const avail=(grid.parentElement && grid.parentElement.clientWidth) || 980;
  let sz=Math.floor((avail - wdW - 6 - (weeks-1)*gap)/weeks);
  sz=Math.max(10, Math.min(24, sz));
  const pitch=sz+gap;
  const cellS=`width:${sz}px;height:${sz}px`;
  // month row (each label cell spans one week column pitch)
  let months=`<div class="cal-months" style="padding-left:${wdW+4}px">`; let prevM=-1;
  for(let w=0;w<weeks;w++){ const d=new Date(start); d.setDate(d.getDate()+w*7);
    const m=d.getMonth(); months+=`<div class="cal-mcell" style="width:${pitch}px">${m!==prevM?MON[m]:''}</div>`; prevM=m; }
  months+='</div>';
  let wd=`<div class="cal-wd" style="width:${wdW}px;gap:${gap}px">`;
  for(let r=0;r<7;r++) wd+=`<div class="cal-wdcell" style="height:${sz}px;line-height:${sz}px">${WD[r]}</div>`; wd+='</div>';
  let g=`<div class="cal-grid" style="gap:${gap}px">`;
  for(let w=0;w<weeks;w++){ g+=`<div class="cal-col" style="gap:${gap}px">`;
    for(let r=0;r<7;r++){ const d=new Date(start); d.setDate(d.getDate()+w*7+r);
      if(d>today){ g+=`<div class="cal-cell empty" style="${cellS}"></div>`; continue; }
      const iso=isoOf(d); const hit=rec.has(iso);
      g+=`<div class="cal-cell${hit?' hit':''}" style="${cellS}" title="${iso} · ${hit?T('synced'):T('not_synced')}"></div>`; }
    g+='</div>'; }
  g+='</div>';
  grid.innerHTML = months + `<div class="cal-row">${wd}${g}</div>`;
}

function renderOverall(){
  document.getElementById('totalNum').textContent = DATA.total.toLocaleString();
  document.getElementById('ovName').textContent = DATA.author.name||'';
  document.getElementById('ovAff').textContent = DATA.author.affiliation||'';
  renderTotalBadge();
  drawTotal();
}
function renderTotalBadge(){
  renderBadgeChooser('totalBadgeOpts','totalBadgeCopies','/badge/total',totalFmt,
    f=>{ totalFmt=f; renderTotalBadge(); }, authorScholarUrl());
}
function drawTotal(){
  const f=filterDays(DATA.history.dates, DATA.history.total, totalDays);
  renderRange('totalRange', totalDays, r=>{ totalDays=r; drawTotal(); });
  totalChart=drawChart('totalChart', f.dates, f.vals, T('trend_total'), totalChart);
  const te=document.getElementById('totalEmbed'); if(te) te.innerHTML=copyOne('iframe', embedSnippet('total', totalDays));
}

function paperMeta(p){ return p.year || ''; }
function renderPapers(){
  const q=(document.getElementById('paperSearch').value||'').toLowerCase();
  document.getElementById('paperRows').innerHTML = DATA.papers.filter(p=>p.title.toLowerCase().includes(q)).map(p=>
    `<tr data-pid="${esc(p.paper_id)}" class="${p.paper_id===selPid?'active':''}">`
    +`<td>${esc(p.title)}<div class="muted" style="font-size:12px">${esc(paperMeta(p))}</div></td>`
    +`<td class="text-end"><span class="cit-pill">${p.citations.toLocaleString()}</span></td></tr>`).join('');
  document.querySelectorAll('#paperRows tr').forEach(tr=>tr.onclick=()=>selectPaper(tr.dataset.pid));
}
function selectPaper(pid){
  selPid=pid; renderPapers();
  const p=DATA.papers.find(x=>x.paper_id===pid); if(!p) return;
  document.getElementById('paperDetail').innerHTML =
    `<h5 class="mb-1">${esc(p.title)}</h5>`
    +`<div class="muted mb-3">${esc(paperMeta(p))} · <b style="color:var(--accent)">${p.citations.toLocaleString()}</b> ${T('cit')}</div>`
    +`<div class="card-h mb-2">${T('badge_title')}</div>`
    +`<div class="badge-opts" id="paperBadgeOpts"></div>`
    +`<div id="paperBadgeCopies"></div>`
    +`<div class="d-flex justify-content-between align-items-center mt-3 mb-2 flex-wrap gap-2">`
    +`<div class="card-h">${T('trend_paper')}</div><div class="range btn-group" id="paperRange"></div></div>`
    +`<div class="chart-box"><canvas id="paperChart"></canvas></div>`
    +`<div class="card-h mt-3 mb-2">${T('embed_label')}</div>`
    +`<div id="paperEmbed"></div>`;
  renderPaperBadge(pid);
  paperChart=null; drawPaper();
}
function renderPaperBadge(pid){
  renderBadgeChooser('paperBadgeOpts','paperBadgeCopies','/badge/paper/'+pid,paperFmt,
    f=>{ paperFmt=f; renderPaperBadge(pid); }, paperScholarUrl(pid));
}
function drawPaper(){
  if(!selPid) return;
  const f=filterDays(DATA.history.dates, DATA.history.by_paper[selPid]||[], paperDays);
  renderRange('paperRange', paperDays, r=>{ paperDays=r; drawPaper(); });
  paperChart=drawChart('paperChart', f.dates, f.vals, T('trend_paper'), paperChart);
  const pe=document.getElementById('paperEmbed'); if(pe) pe.innerHTML=copyOne('iframe', embedSnippet(selPid, paperDays));
}

function applyStatic(){
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=T(e.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(e=>e.placeholder=T(e.dataset.i18nPh));
  document.getElementById('tagline').textContent=T('tagline');
  document.getElementById('footNote').textContent=T('footNote');
  document.getElementById('forkBody').innerHTML=FORK[LANG]+envTable(LANG);
}
function renderAll(){ applyStatic(); renderOverall(); renderPapers(); renderInfo();
  if(!selPid && DATA.papers.length) selPid=DATA.papers[0].paper_id;
  if(selPid) selectPaper(selPid); }

document.getElementById('langToggle').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return;
  LANG=b.dataset.lang; document.documentElement.lang=LANG;
  document.querySelectorAll('#langToggle button').forEach(x=>x.classList.toggle('active',x===b));
  if(DATA) renderAll();
});
document.getElementById('paperSearch').addEventListener('input', renderPapers);
document.querySelector('[data-bs-target="#p-info"]').addEventListener('shown.bs.tab', renderCalendar);
let _rz; window.addEventListener('resize', ()=>{ clearTimeout(_rz); _rz=setTimeout(renderCalendar, 150); });

/* theme (dark mode) */
(function(){
  var saved; try{ saved=localStorage.getItem('pct-theme'); }catch(e){}
  var dark = saved ? saved==='dark' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
  function apply(d){ document.documentElement.setAttribute('data-theme', d?'dark':'light');
    var b=document.getElementById('themeBtn'); if(b) b.textContent = d?'☀️':'🌙'; }
  apply(dark);
  var btn=document.getElementById('themeBtn');
  if(btn) btn.addEventListener('click', function(){
    dark=!dark; apply(dark); try{ localStorage.setItem('pct-theme', dark?'dark':'light'); }catch(e){}
    if(typeof DATA!=='undefined' && DATA) renderAll();   // redraw charts with themed colors
  });
})();

fetch('/api/data').then(r=>r.json()).then(d=>{ DATA=d; renderAll(); })
  .catch(e=>{ document.getElementById('tagline').textContent='Failed to load data: '+e; });
</script>
