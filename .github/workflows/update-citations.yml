name: Update citations
# Daily Google Scholar citation refresh via SerpAPI -> _data/citations.json (+ history).
# The API key lives ONLY in the encrypted Actions secret SERPAPI_KEY, never in the repo.

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily
  workflow_dispatch: {}    # allow manual run from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-citations
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch & update citation data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python3 scripts/update_citations.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain _data/citations.json _data/citations_history.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/citations.json _data/citations_history.json
            git commit -m "chore: daily citation update [skip ci]"
            git push
          else
            echo "No citation changes today."
          fi
