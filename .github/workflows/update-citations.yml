name: Update Citation Counts

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-citations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch citation counts from Semantic Scholar
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time, os

          # Paper IDs: arXiv IDs or Semantic Scholar paper IDs
          papers = {
            "CESAR":       {"id": "ArXiv:2510.20867", "key": "2510.20867"},
            "ADRPO":       {"id": "ArXiv:2510.18053", "key": "2510.18053"},
            "AC-Flow":     {"id": "ArXiv:2510.18072", "key": "2510.18072"},
            "PRANCE":      {"id": "ArXiv:2407.05010", "key": "2407.05010"},
            "LBC":         {"id": "ArXiv:2302.01411", "key": "LBC"},
            "ORW-CFM-W2":  {"id": "ArXiv:2410.03304", "key": "ORW-CFM-W2"},
            "GDI":         {"id": "ArXiv:2106.06232", "key": "GDI"},
          }

          ids = [p["id"] for p in papers.values()]
          payload = json.dumps({"ids": ids}).encode()

          req = urllib.request.Request(
            "https://api.semanticscholar.org/graph/v1/paper/batch?fields=citationCount,title",
            data=payload,
            headers={"Content-Type": "application/json"}
          )

          try:
            with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.loads(resp.read())
          except Exception as e:
            print(f"API error: {e}")
            data = []

          result = {}
          paper_list = list(papers.values())
          for i, item in enumerate(data):
            if item and item.get("citationCount") is not None:
              key = paper_list[i]["key"]
              result[key] = item["citationCount"]
              print(f"  {key}: {item['citationCount']} citations")

          # Load existing file to preserve manually set values
          citations_path = "_data/citations.json"
          existing = {}
          if os.path.exists(citations_path):
            with open(citations_path) as f:
              existing = json.load(f)

          # Merge: new API results override existing auto values
          existing.update(result)
          existing["_updated"] = __import__("datetime").datetime.utcnow().strftime("%Y-%m-%d")

          with open(citations_path, "w") as f:
            json.dump(existing, f, indent=2)

          print(f"\nSaved {len(result)} citation counts to {citations_path}")
          PYEOF

      - name: Commit updated citations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.json
          git diff --staged --quiet || git commit -m "chore: auto-update citation counts [skip ci]"
          git push
