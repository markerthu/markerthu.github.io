name: Update arXiv Feed

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 7:00 UTC
  workflow_dispatch:

jobs:
  update-arxiv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch recent arXiv papers in Jiajun's research areas
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, urllib.parse, xml.etree.ElementTree as ET, datetime, time

          NS = "http://www.w3.org/2005/Atom"

          # Research topics: RL post-training, self-improvement, reasoning, multimodal
          QUERIES = [
            'ti:"rl post-training" OR ti:"reinforcement learning post-training"',
            'ti:"self-improving" OR ti:"self-evolution" OR ti:"self-play" AND cat:cs.LG',
            'ti:"process reward" OR ti:"reasoning reward" OR ti:"test-time compute scaling"',
            'ti:"flow matching" AND (ti:"fine-tuning" OR ti:"rlhf" OR ti:"reward")',
            'ti:"audio llm" OR ti:"audio reasoning" OR ti:"speech reasoning"',
            'ti:"multimodal reasoning" OR ti:"vision language" AND ti:"reinforcement"',
          ]

          seen = set()
          papers = []

          for q in QUERIES:
            encoded = urllib.parse.quote(q)
            url = f"http://export.arxiv.org/api/query?search_query={encoded}&sortBy=submittedDate&sortOrder=descending&max_results=5"
            try:
              with urllib.request.urlopen(url, timeout=20) as r:
                tree = ET.fromstring(r.read())
            except Exception as e:
              print(f"Error fetching {q[:40]}: {e}")
              time.sleep(2)
              continue

            for entry in tree.findall(f"{{{NS}}}entry"):
              arxiv_id = entry.find(f"{{{NS}}}id").text.split("/abs/")[-1].split("v")[0]
              if arxiv_id in seen:
                continue
              seen.add(arxiv_id)

              title = entry.find(f"{{{NS}}}title").text.strip().replace("\n", " ")
              summary = entry.find(f"{{{NS}}}summary").text.strip().replace("\n", " ")[:200] + "…"
              published = entry.find(f"{{{NS}}}published").text[:10]
              authors = [a.find(f"{{{NS}}}name").text for a in entry.findall(f"{{{NS}}}author")][:3]
              author_str = ", ".join(authors) + (" et al." if len(entry.findall(f"{{{NS}}}author")) > 3 else "")

              # Determine topic tag
              t = title.lower()
              if "flow matching" in t or "flow" in t:
                tag = "Flow Matching"
              elif "audio" in t or "speech" in t:
                tag = "Audio Reasoning"
              elif "process reward" in t or "test-time" in t:
                tag = "Reasoning"
              elif "self-improv" in t or "self-evolv" in t or "self-play" in t:
                tag = "Self-Improvement"
              elif "multimodal" in t or "vision" in t:
                tag = "Multimodal"
              else:
                tag = "RL Training"

              papers.append({
                "id": arxiv_id,
                "title": title,
                "authors": author_str,
                "summary": summary,
                "date": published,
                "tag": tag,
                "url": f"https://arxiv.org/abs/{arxiv_id}"
              })

            time.sleep(3)  # be polite to arXiv

          # Sort by date, keep top 9
          papers.sort(key=lambda p: p["date"], reverse=True)
          papers = papers[:9]

          out = {"updated": datetime.datetime.utcnow().strftime("%Y-%m-%d"), "papers": papers}
          with open("_data/arxiv_feed.json", "w") as f:
            json.dump(out, f, indent=2, ensure_ascii=False)

          print(f"Saved {len(papers)} papers to _data/arxiv_feed.json")
          for p in papers:
            print(f"  [{p['tag']}] {p['title'][:60]}...")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/arxiv_feed.json
          git diff --staged --quiet || git commit -m "chore: weekly arXiv feed update [skip ci]"
          git push
