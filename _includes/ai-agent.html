      more:"Fixed KL strength is always wrong in both directions — too tight kills exploration on promising samples, too loose lets bad samples drift into reward hacking. Sample-level adaptation resolves the dilemma, and it transfers across modalities (we show it on flow models and LLMs).",
      rel:['orw','acflow'],

      more:"The hard part was the W2 term: exact Wasserstein-2 between continuous flows is intractable, so we derived a tractable upper bound inside the flow matching objective. That bound is what balances exploitation (chase reward) against exploration (stay diverse).",

  var NAME_R = ["I'm Jiajun's site agent — a little conversational engine he wrote to answer questions about his research. What can I help with?",
                "Just \"Jiajun's AI Agent\" 🤖 I live on this site and know his papers cold. Ask away!"];
  var CANDO_R = ["I can explain any of Jiajun's papers (CESAR, LBC, GDI, ADRPO, ORW-CFM-W2, AC-Flow, PRANCE, SP-VLA, VarCon), summarize his research direction, or point you to his CV, citations, awards, and contact. Try \"what is CESAR?\" or \"tell me about his research\".",
                 "Lots! Papers, research focus, education, awards, citations, how to get in touch — and I remember context, so you can say \"tell me more\". What are you curious about?"];
  var WHOMADE_R = ["Jiajun wrote me himself — I'm a hand-coded conversational engine (fuzzy matching + topic memory + human-paced typing), no LLM and no server. Kind of fitting for an RL post-training researcher, right?"];
  var OPENERS = ["", "", "", "Good question — ", "Ah, ", "Sure — ", "Right, so — ", "Oh, that one's fun. "];
  var FOLLOWUP = ["Want me to go deeper on {T}?", "Curious how this relates to {T}?", "I can also tell you about {T} if you're interested."];
  var FALLBACKS = ["Hmm, I don't have a confident answer for that one. Try a paper name (CESAR, LBC, GDI, ADRPO…) or a topic like flow matching or audio reasoning — or email jiajunf3 [at] illinois.edu directly.",
                   "That's outside what I know well, honestly. I'm strongest on the papers and Jiajun's background — or you can reach the human at jiajunf3 [at] illinois.edu."];

  /* ════════ RETRIEVAL: char-bigram Dice similarity + phrase/keyword scoring ════════ */
  function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9一-鿿\s-]/g,' ').replace(/\s+/g,' ').trim(); }
  function bigrams(s){ var b=[],i; for(i=0;i<s.length-1;i++) b.push(s.substr(i,2)); return b; }
  function diceRaw(a,b){
    if(a===b) return 1;
    if(a.length<2||b.length<2) return 0;
    var A=bigrams(a), B=bigrams(b), map={}, hit=0, i;
    for(i=0;i<A.length;i++) map[A[i]]=(map[A[i]]||0)+1;
    for(i=0;i<B.length;i++) if(map[B[i]]>0){ map[B[i]]--; hit++; }
    return 2*hit/(A.length+B.length);
  }
  /* max of unpadded (inner typos) and space-padded (boundary typos) similarity */
  function dice(a,b){
    var r1=diceRaw(a,b), r2=diceRaw(' '+a+' ',' '+b+' ');
    return r1>r2 ? r1 : r2;
  }
  function scoreEntry(entry, q, qTokens){
    var s=0, j, k, kn, t, best, sim;
    for(j=0;j<entry.kw.length;j++){
      k=entry.kw[j]; kn=norm(k);
      var w = kn.length>=8 ? 2.2 : (kn.length>=5 ? 1.5 : 1);
      if(q.indexOf(kn)>=0){ s += 2*w; continue; }        /* exact phrase hit */
      best=0;
      for(t=0;t<qTokens.length;t++){                      /* fuzzy token hit (typo-tolerant) */
        sim=dice(qTokens[t],kn);
        if(sim>best) best=sim;
      }
      if(best>=0.72) s += best*w;
    }
    return s;
  }
  function retrieve(qRaw){
    var q=norm(qRaw), qTokens=q.split(' ').filter(function(x){return x.length>1;});
    var best=null, bestS=0, i, s;
    for(i=0;i<KB.length;i++){
      s=scoreEntry(KB[i],q,qTokens);
      if(s>bestS){ bestS=s; best=KB[i]; }
    }
    return bestS>=0.9 ? best : null;
  }

  /* ════════ DIALOGUE STATE ════════ */
  var state = { lastTopic:null, offered:null, lastOpener:-1, lastVariant:{}, visited:{} };
  function pick(arr, lastKey){
    if(arr.length===1) return arr[0];
    var i, tries=0;
    do { i=Math.floor(Math.random()*arr.length); tries++; }
    while(lastKey!==undefined && i===state.lastVariant[lastKey] && tries<5);
    if(lastKey!==undefined) state.lastVariant[lastKey]=i;
    return arr[i];
  }
  function opener(){
    var i, tries=0;
    do { i=Math.floor(Math.random()*OPENERS.length); tries++; } while(i===state.lastOpener && tries<5);
    state.lastOpener=i;
    return OPENERS[i];
  }
  function followupFor(entry){
    if(!entry.rel || !entry.rel.length) return null;
    var candidates = entry.rel.filter(function(id){ return !state.visited[id]; });
    if(!candidates.length) return null;
    var id = candidates[Math.floor(Math.random()*candidates.length)];
    state.offered = id;
    return pick(FOLLOWUP).replace('{T}', NAME[id]||id);
  }
  function entryById(id){ for(var i=0;i<KB.length;i++) if(KB[i].id===id) return KB[i]; return null; }

  function timeHello(){
    var h=new Date().getHours();
    if(h<5)  return "Up late! 🌙";
    if(h<12) return "Good morning! ☀️";
    if(h<18) return "Good afternoon! 👋";
    return "Good evening! 🌆";
  }
  function respond(qRaw){
    var q=norm(qRaw);
    /* social intents first */
    if(GREET_RE.test(qRaw.trim()))  return { text:timeHello()+" "+pick(GREETS,'greet') };
    if(BYE_RE.test(qRaw.trim()))    return { text:pick(BYES,'bye') };
    if(THANKS_RE.test(q))           return { text:pick(THANKS_R,'thanks') };
    if(HOWRU_RE.test(q))            return { text:pick(HOWRU_R,'howru') };
    if(NAME_RE.test(q))             return { text:pick(NAME_R,'name') };
    if(WHOMADE_RE.test(q))          return { text:pick(WHOMADE_R,'whomade') };
    if(CANDO_RE.test(q))            return { text:pick(CANDO_R,'cando'), act:[{t:'🎧 What is CESAR?', h:'/projects/cesar/'},{t:'📄 Publications', h:'/publications/'}] };
    /* accepting an offered follow-up */
    if(YES_RE.test(qRaw.trim()) && state.offered){
      var off=entryById(state.offered); state.offered=null;
      if(off) return answerFrom(off, true);
    }
    /* "tell me more" about current topic */
    if(MORE_RE.test(q) && state.lastTopic){
      var t=state.lastTopic;
      if(t.more && !t._moreServed){
        t._moreServed=true;
        var fu=followupFor(t);
        return { text:t.more + (fu ? '||'+fu : ''), act:t.act };
      }
      var fu2=followupFor(t);
      if(fu2) return { text:"I've told you the best parts of that one! "+fu2 };
    }
    /* content retrieval */
    var hit=retrieve(qRaw);
    if(hit) return answerFrom(hit, false);
    state.offered=null;
    return { text:pick(FALLBACKS,'fb'), act:[{t:'📄 Browse papers', h:'/publications/'},{t:'✉️ Email Jiajun', h:'mailto:jiajunf3@illinois.edu'}] };
  }
  function answerFrom(entry, accepted){
    state.lastTopic=entry; state.visited[entry.id]=true; state.offered=null;
    var body=pick(entry.a, entry.id);
    var pre = accepted ? pick(["Alright — ","Here goes: ",""]) : opener();
    if(pre && /[,—] $/.test(pre) && /^[A-Z][a-z]/.test(body)) body = body.charAt(0).toLowerCase() + body.slice(1);
    var fu = (Math.random()<0.6) ? followupFor(entry) : null;
    return { text: pre+body + (fu ? '||'+fu : ''), act:entry.act };
  }

  /* ════════ HUMAN-PACED DELIVERY ════════
     - thinking time scales with answer length (+jitter)
     - per-char typing speed varies; pauses at punctuation
     - '||' splits a reply into separate bubbles, with a typing
       indicator between them — like a person sending two messages   */
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function el(id){ return document.getElementById(id); }
  function addMsg(text, role){
    var msgs=el('ra-msgs'); if(!msgs) return;
    var div=document.createElement('div');
    div.className='ra-msg ra-'+role;
    div.textContent=text;
    msgs.appendChild(div);
    msgs.scrollTop=msgs.scrollHeight;
  }
  function appendActs(acts){
    if(!acts||!acts.length) return;
    var msgs=el('ra-msgs'); if(!msgs) return;
    var wrap=document.createElement('div');
    wrap.className='ra-acts';
    acts.forEach(function(ac){
      var a=document.createElement('a');
      a.className='ra-act'; a.textContent=ac.t; a.href=ac.h;
      if(/^https?:/.test(ac.h)){ a.target='_blank'; a.rel='noopener noreferrer'; }
      if(ac.h.indexOf('/#')===0 && location.pathname==='/'){
        a.addEventListener('click', function(ev){
          ev.preventDefault(); raClose();
          var sec=document.querySelector(ac.h.substring(1));
          if(sec) sec.scrollIntoView({behavior:'smooth'});
        });
      }
      wrap.appendChild(a);
    });
    msgs.appendChild(wrap);
    msgs.scrollTop=msgs.scrollHeight;
  }
  function showTyping(){
    if(el('ra-typing-indicator')) return;
    var msgs=el('ra-msgs'); if(!msgs) return;
    var div=document.createElement('div');
    div.className='ra-msg ra-bot ra-typing'; div.id='ra-typing-indicator';
    div.innerHTML='<span></span><span></span><span></span>';
    msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
  }
  function removeTyping(){
    var x=el('ra-typing-indicator');
    if(x&&x.parentNode) x.parentNode.removeChild(x);
  }
  function charDelay(ch, prev){
    if(prev==='.'||prev==='!'||prev==='?') return 180+Math.random()*140;  /* breath after sentence */
    if(prev===','||prev===';'||prev==='—') return 70+Math.random()*70;   /* mini-pause */
    return 6+Math.random()*16;                                            /* normal burst */
  }
  function typeBubble(text, done){
    var msgs=el('ra-msgs'); if(!msgs){ if(done) done(); return; }
    var div=document.createElement('div');
    div.className='ra-msg ra-bot';
    msgs.appendChild(div); msgs.scrollTop=msgs.scrollHeight;
    if(reduced){ div.textContent=text; if(done) done(); return; }
    var i=0;
    (function tick(){
      if(i<=text.length){
        div.textContent=text.substring(0,i);
        msgs.scrollTop=msgs.scrollHeight;
        i++;
        setTimeout(tick, charDelay(text[i-1]||'', text[i-2]||''));
      } else if(done) done();
    })();
  }
  function deliver(reply){
    var parts=reply.text.split('||').map(function(p){return p.trim();}).filter(Boolean);
    var idx=0;
    function next(){
      if(idx>=parts.length){ appendActs(reply.act); return; }
      var part=parts[idx++];
      var think = idx===1
        ? Math.min(420+part.length*2.2, 1700)+Math.random()*380   /* reading + thinking */
        : 380+Math.random()*520;                                   /* gap between bubbles */
      showTyping();
      setTimeout(function(){ removeTyping(); typeBubble(part, next); }, reduced?60:think);
    }
    next();
  }

  /* ════════ PUBLIC API (open/close/send) ════════ */
  window.raAsk=function(btn){
    if(!btn) return;
    var text=btn.textContent.replace(/^[^\w]+/,'').trim();
    var chips=el('ra-chips'); var input=el('ra-input');
    if(chips) chips.classList.add('hidden');
    if(input) input.value=text;
    raSend();
  };
  window.raOpen=function(){
    var panel=el('ra-panel'); var btn=el('ra-btn');
    if(!panel||!btn) return;
    panel.classList.add('show');
    panel.setAttribute('aria-hidden','false');
    btn.style.display='none';
    btn.setAttribute('aria-expanded','true');
    var msgs=el('ra-msgs');
    if(msgs&&!msgs.children.length){
      setTimeout(function(){
        deliver({ text:"Hey, welcome 👋 I'm Jiajun's site agent — I know every paper here cold.||Ask me anything, or tap a topic below.",
                  act:[{t:'🏠 Homepage', h:'/'},{t:'📄 Publications', h:'/publications/'},{t:'✉️ Contact', h:'mailto:jiajunf3@illinois.edu'}] });
      },200);
    }
    setTimeout(function(){ var i=el('ra-input'); if(i) i.focus(); },300);
  };
  window.raClose=function(){
    var panel=el('ra-panel'); if(!panel) return;
    panel.classList.remove('show');
    panel.setAttribute('aria-hidden','true');
    var btn=el('ra-btn');
    if(btn){ btn.style.display='flex'; btn.setAttribute('aria-expanded','false'); btn.focus(); }
  };
  document.addEventListener('keydown', function(e){
    var panel=el('ra-panel');
    if(!panel||!panel.classList.contains('show')) return;
    if(e.key==='Escape'){ raClose(); return; }
    if(e.key==='Tab'){
      var f=panel.querySelectorAll('button,input,a[href],[tabindex]:not([tabindex="-1"])');
      if(!f.length) return;
      var first=f[0], last=f[f.length-1];
      if(e.shiftKey){ if(document.activeElement===first){ e.preventDefault(); last.focus(); } }
      else          { if(document.activeElement===last){ e.preventDefault(); first.focus(); } }
    }
  });
  window.raSend=function(){
    var inp=el('ra-input'); if(!inp) return;
    var q=inp.value.trim(); if(!q) return;
    inp.value='';
    addMsg(q,'user');
    deliver(respond(q));
  };

  /* FAB tooltip (once per session) + pulse quiet after open */
  (function(){
    var btn=el('ra-btn'); var tip=el('ra-tip');
    if(!btn) return;
    function quiet(){
      btn.classList.add('ra-quiet');
      if(tip) tip.classList.remove('show');
      try{ sessionStorage.setItem('raSeen','1'); }catch(e){}
    }
    btn.addEventListener('click', quiet);
    try{ if(sessionStorage.getItem('raSeen')==='1'){ btn.classList.add('ra-quiet'); return; } }catch(e){}
    if(tip){
      setTimeout(function(){ tip.classList.add('show'); },2600);
      setTimeout(function(){ tip.classList.remove('show'); },9000);
    }
  })();
})();
</script>
