{% include base_path %}

<header class="site-masthead">
  <div class="masthead-inner">
    <a class="masthead-title" href="{{ base_path }}/">{{ site.title }}</a>
    <nav class="masthead-nav" aria-label="Site navigation">
      {% for link in site.data.navigation.main %}
        {% if link.url contains 'http' %}{% assign domain = '' %}{% else %}{% assign domain = base_path %}{% endif %}
        <a href="{{ domain }}{{ link.url }}">{{ link.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>

<!-- Hidden skeleton: satisfies Minimal Mistakes greedy-nav JS so updateNav() has valid
     DOM to measure (prevents "Maximum call stack size exceeded"). Not displayed. -->
<nav id="site-nav" class="greedy-nav" style="display:none !important" aria-hidden="true">
  <button type="button"><div class="navicon"></div></button>
  <ul class="visible-links">
    <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
  </ul>
  <ul class="hidden-links hidden"></ul>
</nav>
