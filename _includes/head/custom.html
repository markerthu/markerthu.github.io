{% if page.date %}
<!-- Blog post specific styles — academic grade, eye-protective -->
<style>
  /*
   * Color rationale (护眼 / ICLR-grade):
   *   Page bg   #eef1f1  — 10% tint of #90A5A7, removes harsh glare
   *   Content   #ffffff  — pure white card, crisp contrast for reading
   *   Text      #2d3748  — dark slate (not pure black), reduces eye strain
   *   Accent    #90A5A7  — muted steel-teal for decorative elements
   *   Links     #2c6e8a  — desaturated academic blue-teal, not jarring
   */

  /* ── Page background: soft warm teal tint ── */
  html, body {
    background: #eef1f1 !important;
  }

  /* ── Content area: matches page background, no card effect ── */
  .page__inner-wrap,
  #main, .page, .initial-content,
  .page__content-wrapper {
    background: #eef1f1 !important;
    box-shadow: none !important;
  }

  /* ── Sidebar: same background ── */
  .sidebar.sticky {
    background: #eef1f1 !important;
    box-shadow: none !important;
  }

  /* ── Body text: dark slate (softer than #000) ── */
  .page--post .page__content,
  .page--post .page__content p,
  .page--post .page__content li {
    color: #2d3748;
    line-height: 1.78;
    font-size: 0.96em;
  }

  /* ── Headings ── */
  .page--post .page__content h2 {
    border-left: 4px solid #90A5A7;
    padding-left: 14px;
    color: #1a2332;
    font-weight: 800;
    margin-top: 2em;
  }
  .page--post .page__content h3 {
    color: #2d3748;
    font-weight: 700;
    margin-top: 1.6em;
  }

  /* ── Links: muted academic teal-blue ── */
  .page--post .page__content a {
    color: #2c6e8a;
    text-decoration: none;
    border-bottom: 1px solid rgba(44,110,138,0.25);
    transition: color 0.15s, border-color 0.15s;
  }
  .page--post .page__content a:hover {
    color: #1a4f66;
    border-bottom-color: rgba(26,79,102,0.6);
  }

  /* ── Blockquote: slightly darker than page bg ── */
  .page--post .page__content blockquote {
    background: #dde8e8;
    border-left: 4px solid #90A5A7;
    border-radius: 0 8px 8px 0;
    padding: 14px 20px;
    color: #3d5461;
    font-style: normal;
    font-size: 0.95em;
  }

  /* ── Inline code ── */
  .page--post .page__content code {
    background: #ffffff;
    border: 1px solid #c8d8d8;
    border-radius: 4px;
    font-size: 0.875em;
    color: #2d5a6b;
    padding: 1px 5px;
  }
  /* ── Code block: white to stand out on teal-tinted bg ── */
  .page--post .page__content pre {
    background: #ffffff;
    border: 1px solid #c8d8d8;
    border-top: 3px solid #90A5A7;  /* accent top bar */
    border-radius: 0 0 8px 8px;
    overflow-x: auto;               /* horizontal scroll, never clip */
    white-space: pre;
    padding: 14px 18px;
    margin: 1.2em 0;
    position: relative;
    font-size: 0.875em;
    color: #2d3748;
    line-height: 1.6;
  }
  .page--post .page__content pre code {
    border: none;
    background: transparent;
    padding: 0;
    font-size: inherit;
    color: inherit;
  }
  /* Copy button toolbar */
  .code-wrap {
    position: relative;
    margin: 1.2em 0;
  }
  .code-wrap pre {
    margin: 0 !important;
  }
  .code-copy-btn {
    position: absolute;
    top: -1px;
    right: 0;
    background: #90A5A7;
    color: #fff;
    border: none;
    border-radius: 0 0 0 6px;
    padding: 2px 11px;
    font-size: 0.72em;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s;
    z-index: 10;
  }
  .code-copy-btn:hover { background: #6e8e90; }
  .code-copy-btn.copied { background: #4caf7d; }

  /* ── Horizontal rules: subtle teal tint ── */
  .page--post .page__content hr {
    border: none;
    border-top: 2px solid #dce5e6;
    margin: 2em 0;
  }

  /* ── Images: preserve natural aspect ratio, never overflow ── */
  .page--post .page__content figure img,
  .page--post .page__content p img {
    max-width: 100%;   /* prevent overflow, but never force-stretch */
    height: auto;      /* always preserve aspect ratio */
    display: block;
    margin: 0 auto;
    border-radius: 6px;
  }

  /* ── Reading progress bar: #90A5A7 teal gradient ── */
  #reading-progress {
    background: linear-gradient(to right, #90A5A7, #607d8b, #90A5A7) !important;
  }

  /* ─────────────── Dark mode ─────────────── */
  /* html needs its own !important rule here — the blog-post `html { background: #eef1f1 !important }` above
     would otherwise win over the inline style set by the anti-flash script.
     html.dark-mode-pending covers page-load; html:has(body.dark-mode) covers runtime toggle. */
  html.dark-mode-pending,
  html:has(body.dark-mode) {
    background: #0d1117 !important;
  }
  body.dark-mode {
    background: #0d1117 !important;
  }
  body.dark-mode .page__inner-wrap,
  body.dark-mode #main,
  body.dark-mode .page,
  body.dark-mode .initial-content,
  body.dark-mode .page__content-wrapper {
    background: #0d1117 !important;
    box-shadow: none !important;
  }
  body.dark-mode .sidebar.sticky {
    background: #0d1117 !important;
    box-shadow: none !important;
  }
  body.dark-mode .page--post .page__content,
  body.dark-mode .page--post .page__content p,
  body.dark-mode .page--post .page__content li { color: #b5c2c8 !important; }
  body.dark-mode .page--post .page__content h2 {
    color: #e2eaec !important;
    border-left-color: #90A5A7 !important;
  }
  body.dark-mode .page--post .page__content h3 { color: #c8d6da !important; }
  body.dark-mode .page--post .page__content a { color: #7cb9ca !important; border-bottom-color: rgba(124,185,202,0.3) !important; }
  body.dark-mode .page--post .page__content a:hover { color: #a8d4e0 !important; }
  body.dark-mode .page--post .page__content blockquote {
    background: #1c2b30 !important;
    color: #8faab1 !important;
    border-left-color: #90A5A7 !important;
  }
  body.dark-mode .page--post .page__content code {
    background: #1c2428 !important;
    border-color: #2d3f45 !important;
    color: #7fb3bf !important;
  }
  body.dark-mode .page--post .page__content pre {
    background: #131d21 !important;
    border-color: #2d3f45 !important;
    border-top-color: #90A5A7 !important;
    color: #b5c2c8 !important;
  }
  body.dark-mode .code-copy-btn { background: #3a5c63 !important; }
  body.dark-mode .code-copy-btn:hover { background: #4e7880 !important; }
  body.dark-mode .page--post .page__content hr { border-top-color: #2a3f47 !important; }

</style>

<!-- Reading progress bar + code copy buttons (blog posts only) -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    /* Reading progress bar */
    var bar = document.createElement('div');
    bar.id = 'reading-progress';
    document.body.insertBefore(bar, document.body.firstChild);
    window.addEventListener('scroll', function() {
      var total = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = (total > 0 ? (window.scrollY / total * 100) : 0) + '%';
    }, { passive: true });

    /* Code block copy buttons — toolbar above code, never overlaps content */
    document.querySelectorAll('.page__content pre').forEach(function(pre) {
      /* wrap in .code-wrap */
      var wrap = document.createElement('div');
      wrap.className = 'code-wrap';
      pre.parentNode.insertBefore(wrap, pre);
      wrap.appendChild(pre);

      /* Copy button anchored to top-right corner of the accent border */
      var btn = document.createElement('button');
      btn.textContent = 'Copy';
      btn.className = 'code-copy-btn';
      btn.addEventListener('click', function() {
        var src = (pre.querySelector('code') || pre).innerText;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(src).then(function() {
            btn.innerHTML = '<i class=\"lbl-ico\" style=\"color:#16a34a;-webkit-mask-image:url(/images/icons/h-check.png);mask-image:url(/images/icons/h-check.png)\"></i> Copied';
            btn.classList.add('copied');
            setTimeout(function() {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1800);
          });
        }
      });
      wrap.appendChild(btn);
    });
  });
</script>

<script>
/* unify navbar: mark current page active in theme masthead (matches project-page site-masthead) */
document.addEventListener('DOMContentLoaded', function(){
  var path = location.pathname.replace(/\/+$/,'') || '/';
  var links = document.querySelectorAll('.masthead-nav a');
  links.forEach(function(a){
    var href = (a.pathname || '').replace(/\/+$/,'');
    if(!href) return;
    if(path===href || path.indexOf(href+'/')===0) a.classList.add('nav-active');
  });
});
</script>
